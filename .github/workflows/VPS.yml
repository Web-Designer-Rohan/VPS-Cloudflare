name: Temporary Ubuntu VPS via Cloudflare

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server
          echo "runner:rohan2026" | sudo chpasswd
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

      - name: Install and Run Cloudflared
        run: |
          # Install cloudflared
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          # Start tunnel and capture BOTH stdout and stderr
          nohup cloudflared tunnel --url ssh://localhost:22 > tunnel.log 2>&1 &
          
          # Loop until the URL appears in the logs
          echo "Waiting for Cloudflare URL..."
          TIMEOUT=30
          while ! grep -q "trycloudflare.com" tunnel.log; do
            sleep 2
            TIMEOUT=$((TIMEOUT-2))
            if [ $TIMEOUT -le 0 ]; then
              echo "Timed out waiting for tunnel."
              exit 1
            fi
          done
          
          echo "=========================================="
          echo "Your Cloudflare Tunnel URL is:"
          grep -o 'https://[^[:space:]]*\.trycloudflare\.com' tunnel.log
          echo "=========================================="

      - name: Keep Runner Alive
        run: |
          echo "Keep-alive active. Connect now!"
          sleep 21600 

      - name: Reliability Check
        if: always()
        run: echo "Session ended."
